<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crystal Vault Ultimate</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="particles"></div>

<div class="container">

<h1>💎 Crystal Vault Ultimate</h1>

<div class="themeBox">
<select id="themeSelect">
<option value="purple">Purple</option>
<option value="ocean">Ocean</option>
<option value="matrix">Matrix</option>
<option value="sunset">Sunset</option>
</select>
</div>

<div class="stats">
<div class="card">Wins <h2 id="wins">0</h2></div>
<div class="card">Losses <h2 id="losses">0</h2></div>
<div class="card">Streak <h2 id="streak">0</h2></div>
<div class="card">Win Rate <h2 id="rate">0%</h2></div>
</div>

<div class="aiBox">
AI: <span id="aiName">Atlas</span>
<div id="aiText">Calculating luck...</div>
</div>

<h2>Choose A Crystal</h2>
<div id="crystalContainer"></div>

<h2 id="result">Begin your journey.</h2>

<h3>Achievements</h3>
<div id="achievements"></div>

<h3>History</h3>
<div id="history"></div>

<button onclick="resetProgress()">Reset Progress</button>

</div>

<script src="particles.js"></script>
<script src="script.js"></script>

</body>
</html>
